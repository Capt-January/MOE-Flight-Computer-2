[env:teensy41]
platform = teensy
board = teensy41
framework = arduino
lib_deps = 
	sparkfun/SparkFun u-blox GNSS Arduino Library@^2.2.28
	mikem/RadioHead@^1.120
	adafruit/Adafruit ADXL375@^1.1.2
	sparkfun/SparkFun BMI270 Arduino Library@^1.0.3
	adafruit/Adafruit LIS2MDL@^2.1.8
	robtillaart/MS5611@^0.5.1
